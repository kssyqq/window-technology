        <label>Какие блюда Вы хотели бы увидеть в меню?</label>
        <textarea></textarea>

    </fieldset>
    <fieldset>
        <legend>Оценка нашего заведения</legend>
        <p>Почему Вы выбрали наше заведение?</p>
        <input type="radio" name="1"><label>Недалеко от дома/работы</label><br><br>
        <input type="radio"  name="1"><label>Увидел рекламу</label><br><br>
        <input type="radio"  name="1"><label>Посоветовали</label><br><br>
        <input type="radio"  name="1"><label>Оптимальное соотношение цены и качества</label><br><br>
        <p>Вы будете рекомендовать наше заведение своим знакомым?</p>
        <input type="radio" name="1"><label>Да</label>
        <input type="radio" name="1"><label>Нет</label>
    </fieldset>
    <input type="submit" value="Отправить">
